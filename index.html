<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💌</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
  font-family: Arial, sans-serif;
  text-align:center;
  color:white;
  overflow:hidden;
}

/* INTRO NETFLIX */
#intro {
  position:absolute;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:4rem;
  letter-spacing:10px;
  animation: introAnim 3s forwards;
}

@keyframes introAnim {
  0% { opacity:0; transform: scale(0.5);}
  50% { opacity:1; transform: scale(1.2);}
  100% { opacity:0; transform: scale(1);}
}

/* CONTENIDO */
#contenido {
  display:none;
  max-width:90%;
}

/* NOMBRE ANIMADO */
.nombre {
  font-size:3rem;
  animation: brillo 2s infinite;
}

@keyframes brillo {
  0%,100% { color:#fff; }
  50% { color:#ff4d6d; }
}

/* BOTONES */
button {
  margin:10px;
  padding:15px 25px;
  border:none;
  border-radius:30px;
  font-size:1.2rem;
  cursor:pointer;
}

.si { background:#ff4d6d; color:white; }
.obvio { background:#ff85a1; color:white; }

/* CORAZONES */
.corazones span {
  position:absolute;
  color:white;
  animation: flotar 10s linear infinite;
}

@keyframes flotar {
  from { transform: translateY(100vh);}
  to { transform: translateY(-10vh);}
}
</style>

</head>
<body>

<div id="intro">LORE</div>

<div id="contenido"></div>

<audio id="musica" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
const activacion = new Date("2026-03-30T17:35:00");
const contenido = document.getElementById("contenido");
const intro = document.getElementById("intro");
const musica = document.getElementById("musica");

/* INTRO */
setTimeout(()=>{
  intro.style.display="none";
  contenido.style.display="block";
},3000);

/* CUENTA REGRESIVA / PREGUNTA */
function actualizar(){
  const ahora = new Date();

  if (ahora >= activacion){
    contenido.innerHTML = `
      <div>
        <div class="nombre">Lore 💖</div>
        <p>Desde que llegaste… todo cambió ✨</p>
        <h1>¿Quieres ser mi novia? ❤️</h1>

        <button class="si" onclick="respuesta()">Sí 💖</button>
        <button class="obvio" onclick="respuesta()">Obvio sí 😍</button>
      </div>
    `;
    musica.play();
  } else {
    const diff = activacion - ahora;
    const h = Math.floor(diff/1000/60/60);
    const m = Math.floor((diff/1000/60)%60);
    const s = Math.floor((diff/1000)%60);

    contenido.innerHTML = `
      <p>💌 Este momento es especial</p>
      <h2>${h}h ${m}m ${s}s ⏳</h2>
    `;
  }
}

setInterval(actualizar,1000);

/* RESPUESTA */
function respuesta(){
  if (navigator.vibrate){
    navigator.vibrate([200,100,200]);
  }

  contenido.innerHTML = `
    <h1>❤️ Sabía que dirías que sí ❤️</h1>
    <p>Prometo hacerte muy feliz 💖</p>
  `;
}
</script>

</body>
</html>
